/* ============================================================
   4) HAVERSINE FORMÜLÜ — iki koordinat arası km cinsinden mesafe
   ============================================================ */
function haversineMesafe(lat1, lon1, lat2, lon2) {
  const R = 6371; // Dünya yarıçapı (km)
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

function mesafeFormatla(km) {
  if (km < 1) return Math.round(km * 1000) + " m uzakta";
  return km.toFixed(1) + " km uzakta";
}

/* ============================================================
   5) HARİTA YÖNLENDİRME — Google Maps arama linki
   ============================================================ */
function yolTarifiAc(lat, lng) {
  const url = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
  window.open(url, "_blank", "noopener,noreferrer");
}

/* ============================================================
   6) YER KARTI BİLEŞENİ
   ============================================================ */
function YerKarti({ yer, mesafe }) {
  const [acik, setAcik] = useState(false);
  const kat = katMap[yer.kategori];
  const detayVar = Boolean(
    (yer.kategori === "Tarihi" && yer.detayli_bilgi) ||
    (yer.kategori === "Meşhur Lezzetler" && yer.meshur_yemegi)
  );

  return (
    <div className="rounded-2xl overflow-hidden flex flex-col shadow-lg bg-[#16294A] border border-[#223A5E] transition-transform duration-200 hover:-translate-y-1">
      <div className="relative h-40 w-full overflow-hidden">
        <img src={yer.gorsel} alt={yer.isim} className="w-full h-full object-cover" />
        <div
          className="absolute top-3 left-3 flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold text-[#161616]"
          style={{ backgroundColor: kat.color }}
        >
          <i className={`fa-solid ${kat.icon} text-[11px]`}></i>
          {kat.label}
        </div>
        <div className="absolute bottom-3 right-3 flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-bold text-[#F5EFE0] bg-[#101F33]/85 border border-[#F5EFE0]/25 backdrop-blur-sm">
          <i className="fa-solid fa-compass text-[11px]"></i>
          {mesafe === null ? "—" : mesafeFormatla(mesafe)}
        </div>
        {yer.kesif && (
          <div className="absolute top-3 right-3 flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] font-bold text-[#101F33] bg-[#F5EFE0]">
            <i className="fa-solid fa-gem text-[10px]"></i>
            Az Bilinen
          </div>
        )}
        <div className="absolute bottom-3 left-3 flex items-center gap-0.5" title={`Önem puanı: ${yer.onem}/5`}>
          {[1, 2, 3, 4, 5].map(i => (
            <i
              key={i}
              className="fa-solid fa-star text-[10px]"
              style={{ color: i <= yer.onem ? "#D9A441" : "rgba(245,239,224,0.25)" }}
            ></i>
          ))}
        </div>
      </div>

      <div className="p-4 flex flex-col gap-2 flex-1">
        <div>
          <h3 className="font-display text-lg leading-tight font-bold text-[#F5EFE0]">{yer.isim}</h3>
          <p className="text-xs text-[#7C93AE]">{yer.sehir}</p>
        </div>

        <p className="text-sm leading-relaxed text-[#C7D4E3]">{yer.aciklama}</p>

        {yer.kategori === "Meşhur Lezzetler" && (
          <div className="flex items-center gap-2 mt-1 flex-wrap">
            <span className="inline-flex items-center gap-1 text-xs font-semibold px-2 py-1 rounded-md bg-[#E2653B]/15 text-[#E2653B]">
              <i className="fa-solid fa-drumstick-bite text-[11px]"></i>
              Meşhuru: {yer.isim.replace("Meşhur ", "")}
            </span>
            <span className="inline-flex items-center gap-0.5" title={`Fiyat segmenti: ${yer.fiyat_segmenti}`}>
              {[0, 1, 2].map(i => (
                <i
                  key={i}
                  className="fa-solid fa-turkish-lira-sign text-[12px]"
                  style={{ color: i < yer.fiyat_segmenti.length ? "#D9A441" : "#3F5476" }}
                ></i>
              ))}
            </span>
          </div>
        )}

        {detayVar && (
          <React.Fragment>
            <button
              onClick={() => setAcik(v => !v)}
              className="flex items-center gap-1.5 text-xs font-semibold mt-1 self-start text-[#D9A441]"
            >
              <i className={`fa-solid ${yer.kategori === "Tarihi" ? "fa-book-open" : "fa-utensils"} text-[11px]`}></i>
              {acik
                ? "Daha az göster"
                : yer.kategori === "Tarihi" ? "Hikayeyi Oku" : "Lezzetin Detayı"}
              <i className={`fa-solid ${acik ? "fa-chevron-up" : "fa-chevron-down"} text-[10px]`}></i>
            </button>
            {acik && (
              <div className="text-sm leading-relaxed rounded-lg p-3 mt-1 bg-[#0F1E33] text-[#C7D4E3] border-l-2" style={{ borderColor: kat.color }}>
                {yer.kategori === "Tarihi" ? yer.detayli_bilgi : yer.meshur_yemegi}
              </div>
            )}
          </React.Fragment>
        )}

        <button
          onClick={() => yolTarifiAc(yer.enlem, yer.boylam)}
          className="mt-auto pt-3 flex items-center justify-center gap-2 rounded-xl py-2.5 text-sm font-semibold text-[#F5EFE0] bg-[#159895] hover:opacity-90 transition-opacity"
        >
          <i className="fa-solid fa-diamond-turn-right"></i>
          Yol Tarifi Al
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   7) ANA UYGULAMA
   ============================================================ */
function SehirRehberi() {
  const [konum, setKonum] = useState(null);
  const [konumDurum, setKonumDurum] = useState("bekliyor"); // bekliyor | yukleniyor | izinVerildi | reddedildi | desteklenmiyor
  const [seciliKategoriler, setSeciliKategoriler] = useState(new Set(KATEGORILER.map(k => k.key)));
  const [seciliIl, setSeciliIl] = useState(null); // null = tüm iller
  const [ilPaneliAcik, setIlPaneliAcik] = useState(false);
  const [ilArama, setIlArama] = useState("");
  const [siralamaModu, setSiralamaModu] = useState("mesafe"); // mesafe | onem

  const konumAl = useCallback(() => {
    if (!navigator.geolocation) {
      setKonumDurum("desteklenmiyor");
      setKonum(VARSAYILAN_KONUM);
      return;
    }
    setKonumDurum("yukleniyor");
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        setKonum({
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          kaynak: "gps",
          etiket: "Gerçek konumunuz"
        });
        setKonumDurum("izinVerildi");
      },
      () => {
        setKonum(VARSAYILAN_KONUM);
        setKonumDurum("reddedildi");
      },
      { enableHighAccuracy: true, timeout: 8000 }
    );
  }, []);

  useEffect(() => { konumAl(); }, [konumAl]);

  const simulasyonSec = (s) => {
    setKonum({ lat: s.lat, lng: s.lng, kaynak: "simulasyon", etiket: `${s.label} (simülasyon)` });
    setKonumDurum("izinVerildi");
  };

  const kategoriToggle = (key) => {
    setSeciliKategoriler(prev => {
      const next = new Set(prev);
      next.has(key) ? next.delete(key) : next.add(key);
      return next;
    });
  };

  const filtrelenmisIller = useMemo(() => {
    if (!ilArama.trim()) return TUM_ILLER;
    const q = ilArama.toLocaleLowerCase("tr");
    return TUM_ILLER.filter(il => il.toLocaleLowerCase("tr").includes(q));
  }, [ilArama]);

  const sonucListesi = useMemo(() => {
    if (!konum) return [];
    const liste = YERLER
      .filter(y => seciliKategoriler.has(y.kategori))
      .filter(y => !seciliIl || y.sehir === seciliIl)
      .map(y => ({ ...y, mesafe: haversineMesafe(konum.lat, konum.lng, y.enlem, y.boylam) }));

    if (siralamaModu === "onem") {
      // Önce önem puanına göre (yüksekten düşüğe), eşitlikte mesafeye göre
      return liste.sort((a, b) => (b.onem - a.onem) || (a.mesafe - b.mesafe));
    }
    return liste.sort((a, b) => a.mesafe - b.mesafe);
  }, [konum, seciliKategoriler, seciliIl, siralamaModu]);

  return (
    <div className="min-h-screen w-full bg-[#101F33]">
      {/* HERO */}
      <header className="relative px-5 pt-8 pb-6 bg-[#0C1929]">
        <div className="flex items-center gap-2 mb-1 text-[#D9A441]">
          <i className="fa-solid fa-compass text-lg"></i>
          <span className="text-xs font-semibold tracking-widest uppercase">Türkiye Şehir Rehberi</span>
        </div>
        <h1 className="font-display text-3xl sm:text-4xl mb-1 font-bold text-[#F5EFE0]">Gezgin Asistanı</h1>
        <p className="text-sm text-[#8FA5BE]">
          81 ilin tamamından tarihi yerler, doğa noktaları, eğlence durakları ve meşhur lezzetler — konumunuza göre sıralanmış.
        </p>

        {/* Konum durumu */}
        <div className="mt-4 flex flex-wrap items-center gap-2">
          <div className="flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-medium bg-[#16294A] text-[#C7D4E3] border border-[#223A5E]">
            {konumDurum === "yukleniyor" ? (
              <i className="fa-solid fa-spinner fa-spin text-[12px]"></i>
            ) : (
              <i
                className="fa-solid fa-location-crosshairs text-[12px]"
                style={{ color: konumDurum === "izinVerildi" ? "#4FB286" : "#D9A441" }}
              ></i>
            )}
            {konumDurum === "yukleniyor" && "Konum alınıyor…"}
            {konumDurum === "izinVerildi" && (konum?.etiket ?? "Konum alındı")}
            {konumDurum === "reddedildi" && "Konum reddedildi — varsayılan: Konya"}
            {konumDurum === "desteklenmiyor" && "Bu tarayıcı konumu desteklemiyor — varsayılan: Konya"}
            {konumDurum === "bekliyor" && "Konum bekleniyor…"}
          </div>
          <button
            onClick={konumAl}
            className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium text-[#F5EFE0] bg-[#159895]"
          >
            <i className="fa-solid fa-rotate-left text-[11px]"></i>
            Tekrar dene
          </button>
        </div>

        {/* Konum simülasyonu (demo/test amaçlı) */}
        <div className="mt-3">
          <p className="text-[11px] mb-1.5 text-[#5D7592]">Test için şehir simülasyonu:</p>
          <div className="flex flex-wrap gap-1.5">
            {SIMULASYON_KONUMLARI.map(s => (
              <button
                key={s.label}
                onClick={() => simulasyonSec(s)}
                className="px-2.5 py-1 rounded-md text-[11px] font-medium text-[#8FA5BE] bg-[#0F1E33] border border-[#223A5E]"
              >
                {s.label}
              </button>
            ))}
          </div>
        </div>
      </header>

      {/* Çini deseni ayırıcı — imza görsel öge */}
      <div
        className="h-2 w-full"
        style={{
          backgroundImage: "repeating-linear-gradient(135deg, #159895 0px, #159895 10px, #D9A441 10px, #D9A441 20px, #0C1929 20px, #0C1929 30px)"
        }}
      ></div>

      {/* FİLTRELER */}
      <div className="px-5 py-4 flex flex-wrap gap-2">
        {KATEGORILER.map(k => {
          const aktif = seciliKategoriler.has(k.key);
          return (
            <button
              key={k.key}
              onClick={() => kategoriToggle(k.key)}
              className={"flex items-center gap-1.5 px-3.5 py-2 rounded-full text-sm font-semibold transition-colors " + (aktif ? "text-[#161616]" : "text-[#8FA5BE] border border-[#223A5E]")}
              style={aktif ? { backgroundColor: k.color } : {}}
            >
              <i className={`fa-solid ${k.icon} text-[13px]`}></i>
              {k.label}
            </button>
          );
        })}
      </div>

      {/* İL SEÇİCİ + SIRALAMA MODU */}
      <div className="px-5 pb-3 flex flex-wrap items-center gap-2">
        <button
          onClick={() => setIlPaneliAcik(true)}
          className="flex items-center gap-2 px-3.5 py-2 rounded-full text-sm font-semibold bg-[#16294A] text-[#F5EFE0] border border-[#223A5E]"
        >
          <i className="fa-solid fa-map-location-dot text-[13px]" style={{ color: "#D9A441" }}></i>
          {seciliIl ?? "Tüm İller (81)"}
          <i className="fa-solid fa-chevron-down text-[10px] text-[#5D7592]"></i>
        </button>
        {seciliIl && (
          <button
            onClick={() => setSeciliIl(null)}
            className="flex items-center gap-1 px-2.5 py-1.5 rounded-full text-xs font-medium text-[#8FA5BE] border border-[#223A5E]"
          >
            <i className="fa-solid fa-xmark text-[10px]"></i>
            Temizle
          </button>
        )}

        <div className="flex items-center rounded-full overflow-hidden border border-[#223A5E] ml-auto">
          <button
            onClick={() => setSiralamaModu("mesafe")}
            className={"flex items-center gap-1.5 px-3 py-2 text-xs font-semibold " + (siralamaModu === "mesafe" ? "bg-[#159895] text-[#F5EFE0]" : "text-[#8FA5BE]")}
          >
            <i className="fa-solid fa-route text-[11px]"></i>
            Mesafeye Göre
          </button>
          <button
            onClick={() => setSiralamaModu("onem")}
            className={"flex items-center gap-1.5 px-3 py-2 text-xs font-semibold " + (siralamaModu === "onem" ? "bg-[#159895] text-[#F5EFE0]" : "text-[#8FA5BE]")}
          >
            <i className="fa-solid fa-star text-[11px]"></i>
            Öneme Göre
          </button>
        </div>
      </div>

      {/* İL SEÇİM PANELİ (overlay) */}
      {ilPaneliAcik && (
        <div
          className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/60 backdrop-blur-sm"
          onClick={() => setIlPaneliAcik(false)}
        >
          <div
            className="w-full sm:max-w-lg max-h-[80vh] flex flex-col rounded-t-2xl sm:rounded-2xl bg-[#101F33] border border-[#223A5E] overflow-hidden"
            onClick={(e) => e.stopPropagation()}
          >
            <div className="p-4 border-b border-[#223A5E]">
              <div className="flex items-center justify-between mb-3">
                <h2 className="font-display text-xl font-bold text-[#F5EFE0]">İl Seçin</h2>
                <button onClick={() => setIlPaneliAcik(false)} className="text-[#8FA5BE]">
                  <i className="fa-solid fa-xmark text-lg"></i>
                </button>
              </div>
              <div className="flex items-center gap-2 px-3 py-2 rounded-lg bg-[#16294A] border border-[#223A5E]">
                <i className="fa-solid fa-magnifying-glass text-xs text-[#5D7592]"></i>
                <input
                  type="text"
                  value={ilArama}
                  onChange={(e) => setIlArama(e.target.value)}
                  placeholder="İl ara… (örn. Trabzon)"
                  className="bg-transparent outline-none text-sm text-[#F5EFE0] placeholder-[#5D7592] w-full"
                />
              </div>
            </div>
            <div className="overflow-y-auto p-4 grid grid-cols-2 sm:grid-cols-3 gap-2">
              <button
                onClick={() => { setSeciliIl(null); setIlPaneliAcik(false); setIlArama(""); }}
                className={"px-3 py-2 rounded-lg text-sm font-semibold text-left " + (!seciliIl ? "bg-[#159895] text-[#F5EFE0]" : "bg-[#16294A] text-[#C7D4E3] border border-[#223A5E]")}
              >
                Tüm İller
              </button>
              {filtrelenmisIller.map(il => (
                <button
                  key={il}
                  onClick={() => { setSeciliIl(il); setIlPaneliAcik(false); setIlArama(""); }}
                  className={"px-3 py-2 rounded-lg text-sm font-semibold text-left truncate " + (seciliIl === il ? "bg-[#159895] text-[#F5EFE0]" : "bg-[#16294A] text-[#C7D4E3] border border-[#223A5E]")}
                >
                  {il}
                </button>
              ))}
              {filtrelenmisIller.length === 0 && (
                <p className="col-span-full text-center text-sm text-[#5D7592] py-6">Eşleşen il bulunamadı.</p>
              )}
            </div>
          </div>
        </div>
      )}

      {/* SONUÇ BİLGİSİ */}
      <div className="px-5 pb-2 flex items-center gap-1.5 text-xs text-[#5D7592]">
        <i className="fa-solid fa-map-pin text-[11px]"></i>
        {sonucListesi.length} yer bulundu · {siralamaModu === "onem" ? "önem sırasına göre" : "en yakından en uzağa"} sıralandı
      </div>

      {/* KART LİSTESİ */}
      <main className="px-5 pb-10 pt-2">
        {sonucListesi.length === 0 ? (
          <div className="rounded-2xl p-8 text-center mt-4 bg-[#16294A] text-[#8FA5BE] border border-dashed border-[#223A5E]">
            En az bir kategori seçin ki size en yakın yerleri gösterebilelim.
          </div>
        ) : (
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {sonucListesi.map(yer => (
              <YerKarti key={yer.id} yer={yer} mesafe={yer.mesafe} />
            ))}
          </div>
        )}
      </main>

      <footer className="px-5 pb-6 text-center text-[11px] text-[#3F5476]">
        Gezgin Asistanı — Konum verileri sadece tarayıcınızda işlenir, hiçbir sunucuya gönderilmez.
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<SehirRehberi />);
</script>

</body>
</html>
